            - paragraph [ref=e83]: The creation of the UCU Law School was a requirement of the time, the university’s response to the challenges of the Revolution of Dignity in 2013-2014. Then, the understanding crystallized that the implementation of the mission and vision of UCU should continue, mainly through the formation of a legal direction at the university. Legal projects at UCU aim to promote a value-oriented reboot of the legal system.
